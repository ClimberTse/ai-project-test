# Production environment configuration
server:
  port: ${APP_PORT:8080}
  compression:
    enabled: true
    mime-types: text/html,text/xml,text/plain,text/css,application/javascript,application/json

logging:
  level:
    root: WARN
    com.example.demo: INFO

app:
  env: prod

management:
  endpoint:
    health:
      show-details: when-authorized
